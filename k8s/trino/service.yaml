apiVersion: v1
kind: Service
metadata:
  name: trino
  namespace: sql-federation
spec:
  selector: { app: trino, role: coordinator }
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
# Security best practice: default-deny then explicit allow. Only Metabase
# and Ranger may talk to Trino; Trino may only egress to RDS SGs and AWS APIs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trino-allow-metabase-and-ranger
  namespace: sql-federation
spec:
  podSelector:
    matchLabels: { app: trino }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: metabase } }
        - podSelector: { matchLabels: { app: ranger } }
      ports:
        - port: 8080
