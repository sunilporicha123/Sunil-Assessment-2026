apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: sql-federation
  labels: { app: metabase }
spec:
  replicas: 2
  selector:
    matchLabels: { app: metabase }
  template:
    metadata:
      labels: { app: metabase }
    spec:
      containers:
        - name: metabase
          image: metabase/metabase:v0.50.8
          ports:
            - containerPort: 3000
          env:
            - name: MB_DB_TYPE
              value: postgres
            - name: MB_DB_HOST
              valueFrom:
                secretKeyRef: { name: metabase-app-db, key: host }
            - name: MB_DB_DBNAME
              valueFrom:
                secretKeyRef: { name: metabase-app-db, key: dbname }
            - name: MB_DB_USER
              valueFrom:
                secretKeyRef: { name: metabase-app-db, key: username }
            - name: MB_DB_PASS
              valueFrom:
                secretKeyRef: { name: metabase-app-db, key: password }
          resources:
            requests: { cpu: "250m", memory: "1Gi" }
            limits:   { cpu: "1",    memory: "2Gi" }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 30
