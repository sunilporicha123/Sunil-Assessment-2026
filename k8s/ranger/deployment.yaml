apiVersion: apps/v1
kind: Deployment
metadata:
  name: ranger
  namespace: sql-federation
  labels: { app: ranger }
spec:
  replicas: 1
  selector:
    matchLabels: { app: ranger }
  template:
    metadata:
      labels: { app: ranger }
    spec:
      containers:
        - name: ranger-admin
          image: apache/ranger:2.5.0
          ports:
            - containerPort: 6080
          envFrom:
            - secretRef:
                name: ranger-db-credentials
          env:
            - name: RANGER_ADMIN_LOG_DIR
              value: /var/log/ranger/admin
            # SSO: OIDC config pointing at AWS Cognito user pool (extra credit item)
            - name: RANGER_AUTH_METHOD
              value: "OIDC"
            - name: RANGER_OIDC_ISSUER_URL
              valueFrom:
                configMapKeyRef: { name: sso-config, key: oidc_issuer_url }
            - name: RANGER_OIDC_CLIENT_ID
              valueFrom:
                configMapKeyRef: { name: sso-config, key: oidc_client_id }
            - name: RANGER_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: sso-secrets, key: oidc_client_secret }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "1",    memory: "2Gi" }
          readinessProbe:
            httpGet: { path: /login.jsp, port: 6080 }
            initialDelaySeconds: 45
