# Author: Sunil Poricha - Cloud SRE - Technical Assessment 2026
# Public entry point: AWS ALB Ingress Controller terminates TLS (ACM cert)
# and routes to Metabase (business dashboards) and Trino UI (engineers only,
# gated by Cognito authentication action at the ALB listener level).

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: federation-ingress
  namespace: sql-federation
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}, {"HTTP":80}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:123456789012:certificate/<CERT_ID>"
    # Cognito authentication at the load balancer - no unauthenticated path reaches pods
    alb.ingress.kubernetes.io/auth-type: cognito
    alb.ingress.kubernetes.io/auth-idp-cognito: >-
      {"UserPoolArn":"arn:aws:cognito-idp:us-east-1:123456789012:userpool/<POOL_ID>",
       "UserPoolClientId":"<CLIENT_ID>",
       "UserPoolDomain":"datawave-federation"}
spec:
  rules:
    - host: dashboards.datawave.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: metabase, port: { number: 80 } }
    - host: trino.datawave.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: trino, port: { number: 8080 } }
