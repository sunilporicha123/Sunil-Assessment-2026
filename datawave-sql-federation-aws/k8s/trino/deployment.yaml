# Author: Sunil Poricha - Cloud SRE - Technical Assessment 2026
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trino
  namespace: sql-federation
  annotations:
    # Bound to the IRSA role created in terraform/eks.tf (trino_irsa_role)
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/datawave-federation-eks-trino-irsa"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino-coordinator
  namespace: sql-federation
  labels: { app: trino, role: coordinator }
spec:
  replicas: 1
  selector:
    matchLabels: { app: trino, role: coordinator }
  template:
    metadata:
      labels: { app: trino, role: coordinator }
    spec:
      serviceAccountName: trino
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: trino
          image: <ECR_REGISTRY>/datawave/trino-federation:latest   # built by Jenkins from docker/trino/Dockerfile
          ports:
            - containerPort: 8080
          env:
            - name: AWS_REGION
              value: "us-east-1"
          envFrom:
            - secretRef:
                name: trino-db-credentials   # populated by External Secrets from Secrets Manager
          volumeMounts:
            - name: catalogs
              mountPath: /etc/trino/catalog
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "4Gi" }
          readinessProbe:
            httpGet: { path: /v1/info, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /v1/info, port: 8080 }
            initialDelaySeconds: 40
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: catalogs
          configMap:
            name: trino-catalogs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino-worker
  namespace: sql-federation
  labels: { app: trino, role: worker }
spec:
  replicas: 2
  selector:
    matchLabels: { app: trino, role: worker }
  template:
    metadata:
      labels: { app: trino, role: worker }
    spec:
      serviceAccountName: trino
      containers:
        - name: trino
          image: <ECR_REGISTRY>/datawave/trino-federation:latest
          env:
            - name: TRINO_NODE_TYPE
              value: "worker"
          envFrom:
            - secretRef:
                name: trino-db-credentials
          volumeMounts:
            - name: catalogs
              mountPath: /etc/trino/catalog
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "4Gi" }
      volumes:
        - name: catalogs
          configMap:
            name: trino-catalogs
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trino-worker-hpa
  namespace: sql-federation
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trino-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
