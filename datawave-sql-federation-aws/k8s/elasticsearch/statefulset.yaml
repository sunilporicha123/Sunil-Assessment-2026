# Author: Sunil Poricha - Cloud SRE - Technical Assessment 2026
# Self-managed Elasticsearch for local/dev parity with the architecture diagram.
# In production, this workload is recommended to be replaced with the managed
# Amazon OpenSearch Service (see docs/ARCHITECTURE.md, "Production Notes").

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: sql-federation
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels: { app: elasticsearch }
  template:
    metadata:
      labels: { app: elasticsearch }
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /usr/share/elasticsearch/data"]
          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "true"
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef: { name: es-credentials, key: password }
            - name: ES_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
          ports:
            - containerPort: 9200
          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
          resources:
            requests: { cpu: "500m", memory: "2Gi" }
            limits:   { cpu: "1",    memory: "3Gi" }
  volumeClaimTemplates:
    - metadata:
        name: es-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 20Gi
