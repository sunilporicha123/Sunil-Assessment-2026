# Author: Sunil Poricha - Cloud SRE - Technical Assessment 2026
# No plaintext secrets live in this repo. The External Secrets Operator (ESO)
# syncs real values from AWS Secrets Manager into native Kubernetes Secrets
# at deploy time, using the IRSA role from terraform/iam.tf.

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: sql-federation
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: trino-db-credentials
  namespace: sql-federation
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: trino-db-credentials
  data:
    - secretKey: RDS_POSTGRES_ENDPOINT
      remoteRef: { key: datawave/rds/postgres, property: endpoint }
    - secretKey: RDS_POSTGRES_DBNAME
      remoteRef: { key: datawave/rds/postgres, property: dbname }
    - secretKey: RDS_POSTGRES_USER
      remoteRef: { key: datawave/rds/postgres, property: username }
    - secretKey: RDS_POSTGRES_PASSWORD
      remoteRef: { key: datawave/rds/postgres, property: password }
    - secretKey: RDS_MYSQL_ENDPOINT
      remoteRef: { key: datawave/rds/mysql, property: endpoint }
    - secretKey: RDS_MYSQL_DBNAME
      remoteRef: { key: datawave/rds/mysql, property: dbname }
    - secretKey: RDS_MYSQL_USER
      remoteRef: { key: datawave/rds/mysql, property: username }
    - secretKey: RDS_MYSQL_PASSWORD
      remoteRef: { key: datawave/rds/mysql, property: password }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sso-secrets
  namespace: sql-federation
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: sso-secrets
  data:
    - secretKey: oidc_client_secret
      remoteRef: { key: datawave/sso/cognito, property: client_secret }
